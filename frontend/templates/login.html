<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AutoWealth</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loader">
            <div class="loader-circle"></div>
            <p>AutoWealth</p>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-box slide-in-up">
            <div class="auth-header">
                <i class="fas fa-coins"></i>
                <h1>AutoWealth</h1>
                <p>Welcome Back</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                    <small class="error-message" id="emailError"></small>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" required placeholder="•••••••••">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <small class="error-message" id="passwordError"></small>
                </div>

                <div class="form-checkbox">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-loading">
                    <span>Login</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div class="auth-divider">
                <span>or</span>
            </div>

            <div class="social-login">
                <button class="social-btn google" title="Login with Google">
                    <i class="fab fa-google"></i>
                    <span>Google</span>
                </button>
                <button class="social-btn github" title="Login with GitHub">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </button>
            </div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="/signup">Sign up</a></p>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>
        </div>

        <div class="auth-visual slide-in-down">
            <div class="visual-card">
                <h2>Your Financial Journey Starts Here</h2>
                <p>Automate your savings, invest wisely, and build wealth effortlessly.</p>
                <div class="visual-stats">
                    <div class="visual-stat">
                        <h3>77%</h3>
                        <p>More Savings</p>
                    </div>
                    <div class="visual-stat">
                        <h3>3x</h3>
                        <p>Faster Growth</p>
                    </div>
                    <div class="visual-stat">
                        <h3>24/7</h3>
                        <p>Automated</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../static/js/script.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Simulate login with demo credentials
            if (email === 'aisha.yadav1@gmail.com' && password === 'pass001') {
                localStorage.setItem('user', JSON.stringify({ id: 1, name: 'Aisha Yadav', email: email }));
                showNotification('Login successful!', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 500);
            } else if (email && password) {
                localStorage.setItem('user', JSON.stringify({ id: 999, name: email.split('@')[0], email: email }));
                showNotification('Demo login - using sample data', 'info');
                setTimeout(() => window.location.href = 'dashboard.html', 500);
            }
        });
    </script>
</body>
</html>
